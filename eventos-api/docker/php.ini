; EventOS dev PHP settings
memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 51M
max_execution_time = 120
max_input_vars = 5000
date.timezone = UTC

; OPcache — revalidate on every request so code edits show up immediately in dev
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
