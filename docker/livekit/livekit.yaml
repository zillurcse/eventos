# LiveKit self-hosted config for local EventOS dev.
# The api key/secret here MUST match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in the
# Laravel .env (config/services.php → livekit). Rotate both for staging/prod.
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # Local dev only. In production set use_external_ip: true (or a TURN server)
  # so remote browsers receive a routable ICE candidate.
  use_external_ip: false
keys:
  devkey: devsecret_change_me_min_32_chars_
logging:
  level: info
