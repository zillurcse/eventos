# ═══════════════════════════════════════════════════════════════════
# EventOS — full local development stack
#   docker compose up -d                       → core stack
#   docker compose --profile tools up -d       → + Adminer DB UI
#   docker compose --profile search up -d      → + Meilisearch
# The Laravel app/horizon/reverb/scheduler all share ONE image (eventos-api:dev).
# ═══════════════════════════════════════════════════════════════════
name: eventos

# Shared definition for every PHP service (api, horizon, reverb, scheduler)
x-api-base: &api-base
  build:
    context: ./eventos-api
    dockerfile: Dockerfile
  image: eventos-api:dev
  restart: unless-stopped
  volumes:
    - ./eventos-api:/var/www/html          # source (bind mount)
    - api_vendor:/var/www/html/vendor       # deps in a named volume (off the OneDrive host)
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EVENTOS_MIGRATOR_PASSWORD: ${EVENTOS_MIGRATOR_PASSWORD:-migrator_secret}
      EVENTOS_APP_PASSWORD: ${EVENTOS_APP_PASSWORD:-app_secret}
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-eventos}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ── Laravel API (php-fpm) ──────────────────────────────────────
  api:
    <<: *api-base
    environment:
      INSTALL_DEPS: "true"      # this service owns composer install + migrate
      RUN_MIGRATIONS: "true"

  # ── Nginx (HTTP front for the API) ─────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${API_HTTP_PORT:-8080}:80"
    volumes:
      - ./eventos-api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s

  # ── Horizon (queue workers) ────────────────────────────────────
  horizon:
    <<: *api-base
    command: ["php", "artisan", "horizon"]
    environment:
      INSTALL_DEPS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  # ── Reverb (WebSockets) ────────────────────────────────────────
  reverb:
    <<: *api-base
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      INSTALL_DEPS: "false"
    ports:
      - "${REVERB_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  # ── Scheduler (php artisan schedule:work) ──────────────────────
  scheduler:
    <<: *api-base
    command: ["php", "artisan", "schedule:work"]
    environment:
      INSTALL_DEPS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  # ── LiveKit (self-hosted WebRTC SFU for Breakout Rooms) ────────
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml", "--node-ip", "${LIVEKIT_NODE_IP:-127.0.0.1}"]
    volumes:
      - ./docker/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"          # signaling (WS/HTTP)
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"  # RTC over TCP fallback
      - "50000-50100:50000-50100/udp"         # RTC media (UDP range)

  # ── Mailpit (catch-all SMTP + web UI) ──────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # web UI; SMTP 1025 stays internal

  # ── MinIO (S3-compatible object storage) ───────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eventos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eventos_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data

  # ── MinIO bucket bootstrap (one-shot) ──────────────────────────
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eventos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eventos_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-eventos}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'waiting for minio...'; sleep 2; done;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set download local/$$MINIO_BUCKET || true;
      echo 'MinIO bucket ready'; exit 0;
      "
    restart: "no"

  # ── Meilisearch (opt-in via --profile search) ──────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    profiles: ["search"]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123456}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data

  # ── Adminer DB UI (opt-in via --profile tools) ─────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8090}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ── Nuxt 4 — Super Admin SPA ───────────────────────────────────
  admin:
    build:
      context: ./eventos-admin
      dockerfile: Dockerfile
    image: eventos-admin:dev
    restart: unless-stopped
    command: ["sh", "-c", "[ -d node_modules/.bin ] || npm install; exec npm run dev -- --host 0.0.0.0 --port 3000"]
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    volumes:
      - ./eventos-admin:/app
      - admin_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_PUBLIC_API_BASE: "http://localhost:${API_HTTP_PORT:-8080}/api/v1"
      NUXT_PUBLIC_REVERB_PORT: "${REVERB_PORT:-8081}"

  # ── Nuxt 4 — Organizer / Attendee SPA ──────────────────────────
  event:
    build:
      context: ./eventos-event
      dockerfile: Dockerfile
    image: eventos-event:dev
    restart: unless-stopped
    command: ["sh", "-c", "[ -d node_modules/.bin ] || npm install; exec npm run dev -- --host 0.0.0.0 --port 3000"]
    ports:
      - "${EVENT_PORT:-3001}:3000"
    volumes:
      - ./eventos-event:/app
      - event_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_PUBLIC_API_BASE: "http://localhost:${API_HTTP_PORT:-8080}/api/v1"
      NUXT_PUBLIC_REVERB_PORT: "${REVERB_PORT:-8081}"
      # Platform apex for per-event subdomains (<subdomain>.<base>). Match PLATFORM_APEX.
      NUXT_PUBLIC_EVENT_BASE_DOMAIN: "${EVENT_BASE_DOMAIN:-expouse.test}"

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilidata:
  api_vendor:
  admin_node_modules:
  event_node_modules:
